<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌍 Uber-Sim — World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419; --panel: #1a212b; --line: #2a3340; --text: #e6edf3;
      --muted: #8b98a5; --idle: #3fb950; --ontrip: #58a6ff; --offline: #6e7681;
      --req: #f0883e; --accent: #d29922; --dest: #f85149;
      --font: "Vazirmatn", -apple-system, "Segoe UI", Tahoma, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); }
    header b { font-size: 16px; font-weight: 800; }
    .spacer { flex: 1; }
    a.back, button { font-family: var(--font); border-radius: 7px; padding: 8px 13px; font-weight: 700; cursor: pointer; font-size: 13px; text-decoration: none; }
    a.back { background: transparent; color: var(--text); border: 1px solid var(--line); }
    button.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); }
    button.danger { background: #b62324; color: #fff; border: none; }
    main { flex: 1; display: flex; min-height: 0; }
    /* min-width/height: 0 so the canvas backing store size doesn't feed back into layout (prevents slow width creep) */
    #canvas { flex: 1; min-width: 0; min-height: 0; display: block; background: #11161c; }
    #side { width: 250px; border-inline-end: 1px solid var(--line); padding: 16px; overflow: auto; }
    .stat { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
    .stat:last-child { border: none; }
    .stat b { font-variant-numeric: tabular-nums; }
    .legend { display: flex; flex-direction: column; gap: 7px; font-size: 12px; margin-top: 14px; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-inline-end: 7px; }
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    .actions button { flex: 1; }
    .pill { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .pill.running { background: #1f6f3f; } .pill.idle { background: #44403c; } .pill.finished { background: #1f4f8f; }
    .pill.waiting { background: #6b4e16; color: #f3d291; }
    .pill.gauntlet { background: #4a2f6b; color: #d8c2f3; margin-inline-start: 6px; }
    .legbar { display: flex; gap: 3px; margin: 8px 0 4px; }
    .legbar i { height: 5px; flex: 1; background: var(--line); border-radius: 2px; }
    .legbar i.done { background: var(--idle); } .legbar i.cur { background: var(--accent); }
    .stat b.city { color: var(--accent); }
    .breakdown { margin-top: 16px; }
    .breakdown h4 { margin: 0 0 8px; font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
    table.legs { width: 100%; border-collapse: collapse; font-size: 12px; }
    table.legs th, table.legs td { padding: 5px 6px; text-align: right; border-bottom: 1px solid var(--line); font-variant-numeric: tabular-nums; }
    table.legs th { color: var(--muted); font-weight: 700; }
    table.legs td.city, table.legs th.city { text-align: left; }
    table.legs tr.cur td { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <a class="back" href="/">← All worlds</a>
    <b id="title">🌍 …</b>
    <span class="pill idle" id="pill">…</span>
    <span class="spacer"></span>
    <a class="back" id="replaylink" href="#" style="display:none">▶ Replay</a>
    <div id="authbar"></div>
  </header>
  <main>
    <canvas id="canvas"></canvas>
    <div id="side">
      <div class="stat"><span>👤 Creator</span><b id="creator">—</b></div>
      <div class="stat"><span>🌍 City</span><b id="worldname" class="city">—</b></div>
      <div id="legwrap" style="display:none">
        <div class="legbar" id="legbar"></div>
      </div>
      <div class="stat"><span>cycle</span><b id="tick" dir="ltr">0 / 0</b></div>
      <div class="stat"><span>Game minute</span><b id="minute">0</b></div>
      <div class="stat"><span id="scope-label">✅ Completed</span><b id="completed">0</b></div>
      <div class="stat"><span>❌ Cancelled</span><b id="cancelled">0</b></div>
      <div class="stat"><span>⭐ Rider rating</span><b id="riderAvg">0.00</b></div>
      <div class="stat"><span>⭐ Driver rating</span><b id="driverAvg">0.00</b></div>
      <div class="stat"><span>💰 Revenue</span><b id="revenue">0</b></div>

      <div class="breakdown" id="breakdown" style="display:none">
        <h4>Per-city breakdown</h4>
        <table class="legs">
          <thead><tr><th class="city">City</th><th>✅</th><th>❌</th><th>💰</th></tr></thead>
          <tbody id="legrows"></tbody>
        </table>
      </div>
      <div class="legend">
        <div><span class="dot" style="background:var(--idle)"></span>🚕 Idle</div>
        <div><span class="dot" style="background:var(--accent)"></span>🚕 En route to rider</div>
        <div><span class="dot" style="background:var(--ontrip)"></span>🚕 On trip</div>
        <div><span class="dot" style="background:var(--offline)"></span>🚕 Asleep</div>
        <div><span class="dot" style="background:var(--req)"></span>🧍 Waiting rider</div>
        <div><span class="dot" style="background:var(--dest)"></span>📍 Destination</div>
      </div>
      <div class="actions">
        <button id="reset" class="ghost">↻ Reset</button>
        <button id="delete" class="danger">🗑 Delete</button>
      </div>
    </div>
  </main>

  <script src="/auth.js"></script>
  <script src="/render.js"></script>
  <script src="/world.js"></script>
</body>
</html>
