<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚕 Uber-Sim — Multi-World Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419; --panel: #1a212b; --line: #2a3340; --text: #e6edf3;
      --muted: #8b98a5; --idle: #3fb950; --ontrip: #58a6ff; --offline: #6e7681;
      --req: #f0883e; --accent: #d29922; --dest: #f85149;
      --font: "Vazirmatn", -apple-system, "Segoe UI", Tahoma, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font); padding: 16px; }
    header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    header h1 { font-size: 18px; margin: 0; font-weight: 800; }
    header .sub { color: var(--muted); font-size: 12px; }
    .spacer { flex: 1; }
    button { font-family: var(--font); background: var(--accent); color: #0f1419; border: none; border-radius: 7px; padding: 9px 14px; font-weight: 700; cursor: pointer; font-size: 13px; }
    button.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); }
    a.navlink { font-family: var(--font); background: transparent; color: var(--text); border: 1px solid var(--line); border-radius: 7px; padding: 9px 14px; font-weight: 700; font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; }

    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color .15s; }
    .card:hover { border-color: var(--accent); }
    .card canvas { display: block; width: 100%; height: 190px; background: #11161c; }
    .card-foot { display: flex; align-items: center; gap: 8px; padding: 8px 10px; font-size: 12px; }
    .card-foot .cid { font-weight: 800; }
    .card-foot .cmaker { color: var(--muted); font-size: 11px; }
    .card-foot .cstat { color: var(--muted); font-variant-numeric: tabular-nums; }
    .empty { color: var(--muted); padding: 40px; text-align: center; grid-column: 1/-1; }

    .pill { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .pill.running { background: #1f6f3f; } .pill.idle { background: #44403c; } .pill.finished { background: #1f4f8f; }
    .pill.waiting { background: #6b4e16; color: #f3d291; }
  </style>
</head>
<body>
  <header>
    <h1>🚕 Multi-World Arena</h1>
    <span class="sub">چندین دنیای Uber هم‌زمان</span>
    <span class="spacer"></span>
    <a class="navlink" href="/results.html">🏆 نتایج</a>
    <button id="new-auto">➕ دنیای جدید (auto)</button>
    <button id="new-empty" class="ghost">➕ خالی (برای matcher بیرونی)</button>
  </header>

  <div id="grid"><div class="empty">هنوز دنیایی نیست. «دنیای جدید» را بزن یا با <code>npm run client</code> یک matcher وصل کن.</div></div>

  <script src="/render.js"></script>
  <script src="/app.js"></script>
</body>
</html>
