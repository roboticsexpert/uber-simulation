<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚕 Uber-Sim — Matching Arena</title>
  <style>
    :root {
      --bg: #0f1419; --panel: #1a212b; --line: #2a3340; --text: #e6edf3;
      --muted: #8b98a5; --idle: #3fb950; --ontrip: #58a6ff; --offline: #6e7681;
      --req: #f0883e; --accent: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Segoe UI", Tahoma, sans-serif;
      display: flex; gap: 16px; padding: 16px; height: 100vh;
    }
    #sidebar { width: 300px; display: flex; flex-direction: column; gap: 14px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 12px; }
    button {
      background: var(--accent); color: #0f1419; border: none; border-radius: 7px;
      padding: 9px 14px; font-weight: 700; cursor: pointer; font-size: 14px; flex: 1;
    }
    button.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); }
    .row { display: flex; gap: 8px; }
    .stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
    .stat:last-child { border: none; }
    .stat b { font-variant-numeric: tabular-nums; }
    .legend { display: flex; flex-direction: column; gap: 7px; font-size: 13px; }
    .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-inline-end: 8px; }
    #canvas-wrap { flex: 1; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    #badge { position: absolute; top: 10px; inset-inline-start: 10px; background: #0f1419cc; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
    .pill { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .pill.running { background: #1f6f3f; } .pill.idle { background: #44403c; } .pill.finished { background: #1f4f8f; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="card">
      <h1>🚕 Matching Arena</h1>
      <div class="sub">شبیه‌سازی Uber — کنترل session</div>
      <div class="row" style="margin-top:12px">
        <button id="start">▶ شروع</button>
        <button id="reset" class="ghost">↻ ریست</button>
      </div>
    </div>

    <div class="card">
      <div class="stat"><span>وضعیت</span><span class="pill idle" id="status">idle</span></div>
      <div class="stat"><span>cycle</span><b id="tick">0 / 0</b></div>
      <div class="stat"><span>دقیقهٔ بازی</span><b id="minute">0</b></div>
      <div class="stat"><span>تخصیص آخر</span><b id="accepted">0</b></div>
    </div>

    <div class="card">
      <div class="sub" style="margin-bottom:8px">📊 جدول امتیاز</div>
      <div class="stat"><span>✅ تکمیل‌شده</span><b id="completed">0</b></div>
      <div class="stat"><span>❌ کنسل‌شده</span><b id="cancelled">0</b></div>
      <div class="stat"><span>⭐ رِیت مسافر</span><b id="riderAvg">0.0</b></div>
      <div class="stat"><span>⭐ رِیت راننده</span><b id="driverAvg">0.0</b></div>
      <div class="stat"><span>💰 درآمد</span><b id="revenue">0</b></div>
    </div>

    <div class="card legend">
      <div><span class="dot" style="background:var(--idle)"></span>🚕 آزاد (منتظر سفر)</div>
      <div><span class="dot" style="background:var(--accent)"></span>🚕 در راهِ رسیدن به مسافر</div>
      <div><span class="dot" style="background:var(--ontrip)"></span>🚕 در حال سفر (مسافر سوار)</div>
      <div><span class="dot" style="background:var(--offline)"></span>🚕 خواب (OFFLINE)</div>
      <div><span class="dot" style="background:var(--req)"></span>🧍 مسافر منتظر</div>
      <div><span class="dot" style="background:#f85149"></span>📍 مقصد</div>
    </div>
  </div>

  <div id="canvas-wrap">
    <div id="badge">در انتظار شروع…</div>
    <canvas id="map"></canvas>
  </div>

  <script src="/app.js"></script>
</body>
</html>
